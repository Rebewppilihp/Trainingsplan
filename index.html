<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<title>Trainingsplan</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161922;
    --card: #1c2030;
    --border: #252a3a;
    --accent: #c8f135;
    --accent2: #3b82f6;
    --accent3: #f97316;
    --text: #f0f4ff;
    --muted: #6b7a99;
    --danger: #ff4d6d;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }

  html { height: -webkit-fill-available; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    padding-bottom: calc(90px + var(--safe-bottom));
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: calc(16px + var(--safe-top)) 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .session-tag {
    background: var(--accent);
    color: #0d0f14;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 11px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  .header-sub {
    color: var(--muted);
    font-size: 12px;
  }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex;
    gap: 0;
    padding: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .stats-bar::-webkit-scrollbar { display: none; }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px 16px;
    flex: 1;
    min-width: 70px;
    border-right: 1px solid var(--border);
  }
  .stat:last-child { border-right: none; }

  .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-size: 9px;
    color: var(--muted);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    white-space: nowrap;
  }

  /* ── EXERCISE LIST ── */
  .exercises {
    padding: 14px 14px 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .exercise-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .exercise-card.open { border-color: rgba(200,241,53,0.4); }

  .ex-header {
    display: flex;
    align-items: center;
    padding: 14px 14px 0 14px;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }

  .ex-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    color: var(--muted);
    min-width: 18px;
  }

  .ex-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 19px;
    letter-spacing: 0.8px;
    color: var(--text);
    flex: 1;
    line-height: 1.1;
  }

  .ex-badge {
    display: flex;
    gap: 5px;
    align-items: center;
    flex-shrink: 0;
  }

  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 8px;
  }

  .badge-reps {
    background: rgba(200,241,53,0.13);
    color: var(--accent);
    border: 1px solid rgba(200,241,53,0.25);
  }

  .badge-weight {
    background: rgba(59,130,246,0.13);
    color: var(--accent2);
    border: 1px solid rgba(59,130,246,0.25);
  }

  .chevron {
    color: var(--muted);
    font-size: 13px;
    margin-left: 2px;
    transition: transform 0.25s;
    flex-shrink: 0;
  }
  .exercise-card.open .chevron { transform: rotate(180deg); }

  /* Sets row */
  .ex-sets-row {
    display: flex;
    gap: 7px;
    padding: 10px 14px 14px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .ex-sets-row::-webkit-scrollbar { display: none; }

  .set-pill {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 8px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 56px;
    cursor: pointer;
    transition: all 0.15s;
    touch-action: manipulation;
  }

  .set-pill.done {
    background: rgba(200,241,53,0.12);
    border-color: var(--accent);
  }

  .set-num {
    font-size: 10px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .set-check {
    font-size: 16px;
    margin-top: 3px;
    color: var(--muted);
    line-height: 1;
  }

  .set-pill.done .set-check { color: var(--accent); }

  /* Edit Panel */
  .edit-panel {
    display: none;
    padding: 0 14px 16px;
    border-top: 1px solid var(--border);
  }

  .exercise-card.open .edit-panel { display: block; }

  .edit-panel-inner {
    padding-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .edit-row {
    display: flex;
    gap: 8px;
  }

  .edit-field {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .edit-field label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    font-weight: 600;
  }

  .stepper {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .stepper button {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 22px;
    font-weight: 400;
    padding: 10px 12px;
    cursor: pointer;
    flex-shrink: 0;
    line-height: 1;
    touch-action: manipulation;
    min-width: 40px;
    text-align: center;
  }

  .stepper button:active { background: rgba(200,241,53,0.1); }

  .stepper input {
    background: none;
    border: none;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    padding: 10px 4px;
    text-align: center;
    flex: 1;
    min-width: 0;
    outline: none;
    -webkit-appearance: none;
  }

  .note-field {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    width: 100%;
    outline: none;
    resize: none;
    min-height: 58px;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  .note-field:focus { border-color: var(--accent2); }
  .note-field::placeholder { color: var(--muted); }

  /* Delete button inside edit panel */
  .btn-delete-ex {
    background: rgba(255,77,109,0.1);
    border: 1px solid rgba(255,77,109,0.3);
    color: var(--danger);
    border-radius: 12px;
    padding: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    touch-action: manipulation;
    transition: background 0.15s;
  }
  .btn-delete-ex:active { background: rgba(255,77,109,0.2); }

  /* ── SUMMARY CARD ── */
  .summary-card {
    margin: 14px 14px 0;
    background: linear-gradient(135deg, rgba(200,241,53,0.08), rgba(59,130,246,0.06));
    border: 1px solid rgba(200,241,53,0.25);
    border-radius: 18px;
    padding: 18px 20px;
  }

  .summary-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .summary-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .summary-item-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    font-weight: 600;
  }

  .summary-item-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    line-height: 1;
    color: var(--text);
  }

  .summary-item-val span {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--muted);
    font-weight: 400;
    margin-left: 2px;
  }

  .summary-item-val.accent { color: var(--accent); }
  .summary-item-val.accent2 { color: var(--accent2); }
  .summary-item-val.accent3 { color: var(--accent3); }

  .summary-highlight {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .summary-highlight-label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }

  .summary-highlight-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  /* ── ADD EXERCISE BUTTON ── */
  .add-ex-btn {
    margin: 12px 14px 0;
    background: rgba(200,241,53,0.07);
    border: 1.5px dashed rgba(200,241,53,0.35);
    border-radius: 18px;
    padding: 16px;
    width: calc(100% - 28px);
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    touch-action: manipulation;
    transition: background 0.15s;
    -webkit-appearance: none;
  }
  .add-ex-btn:active { background: rgba(200,241,53,0.14); }

  /* ── ADD MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 300;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-overlay.show { display: flex; }

  .modal-sheet {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    padding: 24px 20px calc(24px + var(--safe-bottom));
    width: 100%;
    max-width: 520px;
    position: relative;
  }

  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1.5px;
    color: var(--text);
    margin-bottom: 18px;
  }

  .modal-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
  }

  .modal-field label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    font-weight: 600;
  }

  .modal-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    padding: 12px 14px;
    width: 100%;
    outline: none;
    -webkit-appearance: none;
    transition: border-color 0.15s;
  }
  .modal-input:focus { border-color: var(--accent); }

  .modal-row {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }

  .modal-row .modal-field { margin-bottom: 0; }

  .modal-stepper {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .modal-stepper button {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 22px;
    padding: 10px 14px;
    cursor: pointer;
    touch-action: manipulation;
    line-height: 1;
  }
  .modal-stepper button:active { background: rgba(200,241,53,0.1); }

  .modal-stepper input {
    background: none;
    border: none;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    padding: 10px 4px;
    text-align: center;
    flex: 1;
    outline: none;
    -webkit-appearance: none;
    min-width: 0;
  }

  .btn-add-confirm {
    background: var(--accent);
    color: #0d0f14;
    border: none;
    border-radius: 14px;
    padding: 15px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    width: 100%;
    cursor: pointer;
    margin-top: 6px;
    touch-action: manipulation;
    -webkit-appearance: none;
    transition: opacity 0.15s;
  }
  .btn-add-confirm:active { opacity: 0.85; }

  .btn-cancel {
    background: none;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 13px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    width: 100%;
    cursor: pointer;
    margin-top: 8px;
    touch-action: manipulation;
    -webkit-appearance: none;
  }

  /* ── TIMER OVERLAY ── */
  .timer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }

  .timer-overlay.show { display: flex; }

  .timer-modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    padding: 24px 24px calc(32px + var(--safe-bottom));
    width: 100%;
    max-width: 480px;
    text-align: center;
    position: relative;
  }

  .timer-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 18px;
  }

  .timer-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px;
    color: var(--accent);
    letter-spacing: 6px;
    line-height: 1;
    margin: 10px 0 20px;
  }

  .timer-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
  }

  .timer-presets {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }

  .preset-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 20px;
    padding: 8px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    touch-action: manipulation;
    transition: all 0.15s;
    -webkit-appearance: none;
  }

  .preset-btn.sel {
    background: var(--accent);
    color: #0d0f14;
    border-color: var(--accent);
  }

  .timer-btns {
    display: flex;
    gap: 12px;
    justify-content: center;
    align-items: center;
  }

  .timer-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 50%;
    width: 56px;
    height: 56px;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: manipulation;
    -webkit-appearance: none;
    transition: opacity 0.15s;
  }

  .timer-btn.primary {
    background: var(--accent);
    color: #0d0f14;
    border-color: var(--accent);
    width: 72px;
    height: 72px;
    font-size: 28px;
  }

  .timer-btn:active { opacity: 0.75; }

  .close-modal-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: manipulation;
  }

  /* ── FABs ── */
  .fab-row {
    position: fixed;
    bottom: calc(20px + var(--safe-bottom));
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 16px;
    z-index: 99;
    pointer-events: none;
  }

  .fab {
    pointer-events: all;
    border: none;
    border-radius: 50px;
    padding: 13px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 7px;
    touch-action: manipulation;
    -webkit-appearance: none;
    transition: opacity 0.15s, transform 0.15s;
  }

  .fab:active { opacity: 0.8; transform: scale(0.97); }

  .fab-timer {
    background: var(--accent2);
    color: white;
    box-shadow: 0 4px 20px rgba(59,130,246,0.45);
  }

  .fab-reset {
    background: var(--danger);
    color: white;
    box-shadow: 0 4px 20px rgba(255,77,109,0.45);
  }

  /* ── SAVE NOTICE ── */
  .save-notice {
    position: fixed;
    top: calc(-60px - var(--safe-top));
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: #0d0f14;
    font-size: 13px;
    font-weight: 700;
    padding: 10px 22px;
    border-radius: 20px;
    transition: top 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 999;
    white-space: nowrap;
  }

  .save-notice.show { top: calc(16px + var(--safe-top)); }

  /* ── SECTION LABEL ── */
  .section-label {
    padding: 14px 14px 4px;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
  }
</style>
</head>
<body>

<div class="save-notice" id="saveNotice">✓ Gespeichert</div>

<header>
  <div class="header-top">
    <h1>💪 Trainingsplan</h1>
    <span class="session-tag">GYM80</span>
  </div>
  <div class="header-sub" id="dateLabel"></div>
</header>

<div class="stats-bar">
  <div class="stat">
    <span class="stat-val" id="statExCount">7</span>
    <span class="stat-label">Übungen</span>
  </div>
  <div class="stat">
    <span class="stat-val" id="statSets">0/21</span>
    <span class="stat-label">Sätze</span>
  </div>
  <div class="stat">
    <span class="stat-val" id="statKg">—</span>
    <span class="stat-label">Ø kg</span>
  </div>
  <div class="stat">
    <span class="stat-val" id="statVol">—</span>
    <span class="stat-label">Volumen</span>
  </div>
</div>

<div class="section-label">Übungen</div>
<div class="exercises" id="exerciseList"></div>

<button class="add-ex-btn" id="addExBtn">＋ Neue Übung hinzufügen</button>

<!-- Summary Card -->
<div class="summary-card" id="summaryCard">
  <div class="summary-title">📊 Zusammenfassung</div>
  <div class="summary-grid">
    <div class="summary-item">
      <div class="summary-item-label">Gesamtgewicht (alle Sätze)</div>
      <div class="summary-item-val accent" id="sumTotalWeight">—<span>kg</span></div>
    </div>
    <div class="summary-item">
      <div class="summary-item-label">Volumen (erledigt)</div>
      <div class="summary-item-val accent2" id="sumVolDone">—<span>kg</span></div>
    </div>
    <div class="summary-item">
      <div class="summary-item-label">Sätze gesamt</div>
      <div class="summary-item-val" id="sumSetsTotal">—<span>Sätze</span></div>
    </div>
    <div class="summary-item">
      <div class="summary-item-label">Wdh. gesamt</div>
      <div class="summary-item-val" id="sumRepsTotal">—<span>Wdh.</span></div>
    </div>
  </div>
  <div class="summary-highlight">
    <span class="summary-highlight-label">🏆 Fortschritt heute</span>
    <span class="summary-highlight-val" id="sumProgress">0%</span>
  </div>
</div>

<!-- FABs -->
<div class="fab-row">
  <button class="fab fab-timer" id="timerBtn">⏱ Pause</button>
  <button class="fab fab-reset" id="resetBtn">🔄 Reset</button>
</div>

<!-- Timer Modal -->
<div class="timer-overlay" id="timerOverlay">
  <div class="timer-modal">
    <div class="timer-handle"></div>
    <button class="close-modal-btn" id="closeTimer">✕</button>
    <div class="timer-label">Pausenzeit</div>
    <div class="timer-display" id="timerDisplay">01:30</div>
    <div class="timer-presets">
      <button class="preset-btn" onclick="setTimer(60,this)">1 Min</button>
      <button class="preset-btn sel" onclick="setTimer(90,this)">1:30</button>
      <button class="preset-btn" onclick="setTimer(120,this)">2 Min</button>
      <button class="preset-btn" onclick="setTimer(180,this)">3 Min</button>
    </div>
    <div class="timer-btns">
      <button class="timer-btn" id="resetTimerBtn">↺</button>
      <button class="timer-btn primary" id="startTimer">▶</button>
    </div>
  </div>
</div>

<!-- Add Exercise Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Neue Übung</div>

    <div class="modal-field">
      <label>Übungsname</label>
      <input class="modal-input" id="newExName" type="text" placeholder="z.B. Latzug Maschine" autocomplete="off">
    </div>

    <div class="modal-row">
      <div class="modal-field" style="flex:1">
        <label>Sätze</label>
        <div class="modal-stepper">
          <button onclick="modalStep('newExSets',-1)">−</button>
          <input type="number" id="newExSets" value="3" min="1" max="10">
          <button onclick="modalStep('newExSets',1)">+</button>
        </div>
      </div>
      <div class="modal-field" style="flex:1">
        <label>Wiederholungen</label>
        <div class="modal-stepper">
          <button onclick="modalStep('newExReps',-1)">−</button>
          <input type="number" id="newExReps" value="12" min="1" max="100">
          <button onclick="modalStep('newExReps',1)">+</button>
        </div>
      </div>
      <div class="modal-field" style="flex:1">
        <label>Gewicht (kg)</label>
        <div class="modal-stepper">
          <button onclick="modalStep('newExWeight',-2.5)">−</button>
          <input type="number" id="newExWeight" value="20" min="0" step="2.5">
          <button onclick="modalStep('newExWeight',2.5)">+</button>
        </div>
      </div>
    </div>

    <button class="btn-add-confirm" id="confirmAddEx">✓ Übung hinzufügen</button>
    <button class="btn-cancel" id="cancelAddEx">Abbrechen</button>
  </div>
</div>

<script>
// ── DATA ──
const defaultExercises = [
  { id: 1, name: "T-Bar Gym80",               sets: 3, reps: 12, weight: 30, notes: "" },
  { id: 2, name: "Sygnum Pulldown Maschine",  sets: 3, reps: 12, weight: 55, notes: "" },
  { id: 3, name: "Stehende Brustpresse GYM80",sets: 3, reps: 12, weight: 30, notes: "" },
  { id: 4, name: "Hackenschmidt Gym80",        sets: 3, reps: 12, weight: 0,  notes: "" },
  { id: 5, name: "Sygnum Rotationsmaschine",  sets: 3, reps: 12, weight: 50, notes: "" },
  { id: 6, name: "Bizeps Curl Gerät",         sets: 3, reps: 12, weight: 25, notes: "" },
  { id: 7, name: "Trizepsstrecken mit Seil",  sets: 3, reps: 12, weight: 30, notes: "" },
];

const STORAGE_KEY = "trainingsplan_v3";
let nextId = 100;

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      // Ensure nextId is above all existing ids
      if (d.exercises) nextId = Math.max(nextId, ...d.exercises.map(e => e.id)) + 1;
      return d;
    }
  } catch(e) {}
  return {
    exercises: JSON.parse(JSON.stringify(defaultExercises)),
    doneSets: {},
  };
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  flashSave();
}

let state = loadData();
let openCard = null;

function flashSave() {
  const n = document.getElementById("saveNotice");
  n.classList.add("show");
  setTimeout(() => n.classList.remove("show"), 1400);
}

// Date
document.getElementById("dateLabel").textContent =
  new Date().toLocaleDateString("de-DE", { weekday:"long", day:"numeric", month:"long", year:"numeric" });

// ── BUILD ──
function buildAll() {
  const list = document.getElementById("exerciseList");
  list.innerHTML = "";
  state.exercises.forEach((ex, idx) => list.appendChild(buildCard(ex, idx)));
  updateStats();
}

function buildCard(ex, idx) {
  const card = document.createElement("div");
  card.className = "exercise-card" + (openCard === idx ? " open" : "");
  card.id = `card-${idx}`;

  const done = state.doneSets[ex.id] || [];
  const weightDisplay = ex.weight > 0 ? `${ex.weight} kg` : "—";

  let pillsHtml = "";
  for (let s = 0; s < ex.sets; s++) {
    pillsHtml += `<div class="set-pill ${done[s] ? "done" : ""}" onclick="toggleSet(${idx},${s})">
      <span class="set-num">S${s+1}</span>
      <span class="set-check">${done[s] ? "✓" : "○"}</span>
    </div>`;
  }

  card.innerHTML = `
    <div class="ex-header" onclick="toggleCard(${idx})">
      <span class="ex-num">${idx+1}.</span>
      <span class="ex-name">${ex.name}</span>
      <div class="ex-badge">
        <span class="badge badge-reps">${ex.sets}×${ex.reps}</span>
        <span class="badge badge-weight">${weightDisplay}</span>
        <span class="chevron">▾</span>
      </div>
    </div>
    <div class="ex-sets-row">${pillsHtml}</div>
    <div class="edit-panel">
      <div class="edit-panel-inner">
        <div class="edit-row">
          <div class="edit-field">
            <label>Sätze</label>
            <div class="stepper">
              <button onclick="stepVal(${idx},'sets',-1)">−</button>
              <input type="number" value="${ex.sets}" min="1" max="10" id="f-sets-${idx}" oninput="updateField(${idx},'sets',this.value)">
              <button onclick="stepVal(${idx},'sets',1)">+</button>
            </div>
          </div>
          <div class="edit-field">
            <label>Wdh.</label>
            <div class="stepper">
              <button onclick="stepVal(${idx},'reps',-1)">−</button>
              <input type="number" value="${ex.reps}" min="1" max="100" id="f-reps-${idx}" oninput="updateField(${idx},'reps',this.value)">
              <button onclick="stepVal(${idx},'reps',1)">+</button>
            </div>
          </div>
          <div class="edit-field">
            <label>Gewicht</label>
            <div class="stepper">
              <button onclick="stepVal(${idx},'weight',-2.5)">−</button>
              <input type="number" value="${ex.weight}" min="0" step="2.5" id="f-weight-${idx}" oninput="updateField(${idx},'weight',this.value)">
              <button onclick="stepVal(${idx},'weight',2.5)">+</button>
            </div>
          </div>
        </div>
        <div class="edit-field">
          <label>Notizen</label>
          <textarea class="note-field" placeholder="Technikhinweise, Variationen..." oninput="updateField(${idx},'notes',this.value)">${ex.notes}</textarea>
        </div>
        <button class="btn-delete-ex" onclick="deleteExercise(${idx})">🗑 Übung löschen</button>
      </div>
    </div>`;

  return card;
}

function toggleCard(idx) {
  const card = document.getElementById(`card-${idx}`);
  if (openCard === idx) {
    card.classList.remove("open");
    openCard = null;
  } else {
    if (openCard !== null) {
      const prev = document.getElementById(`card-${openCard}`);
      if (prev) prev.classList.remove("open");
    }
    card.classList.add("open");
    openCard = idx;
  }
}

function toggleSet(idx, setIdx) {
  const ex = state.exercises[idx];
  if (!state.doneSets[ex.id]) state.doneSets[ex.id] = [];
  state.doneSets[ex.id][setIdx] = !state.doneSets[ex.id][setIdx];
  saveData();
  const card = document.getElementById(`card-${idx}`);
  const pills = card.querySelectorAll(".set-pill");
  const done = state.doneSets[ex.id];
  pills.forEach((p, s) => {
    p.className = `set-pill ${done[s] ? "done" : ""}`;
    p.querySelector(".set-check").textContent = done[s] ? "✓" : "○";
  });
  updateStats();
}

function updateField(idx, field, val) {
  if (field === "notes") {
    state.exercises[idx].notes = val;
  } else {
    const num = parseFloat(val);
    if (!isNaN(num) && num >= 0) state.exercises[idx][field] = num;
  }
  saveData();
  if (field !== "notes") {
    refreshCardBadges(idx);
    if (field === "sets") rebuildPills(idx);
    updateStats();
  }
}

function stepVal(idx, field, delta) {
  const ex = state.exercises[idx];
  let val = parseFloat(ex[field]) + delta;
  if (field === "sets") val = Math.max(1, Math.min(10, Math.round(val)));
  if (field === "reps") val = Math.max(1, Math.min(100, Math.round(val)));
  if (field === "weight") val = Math.max(0, Math.round(val * 10) / 10);
  ex[field] = val;
  const inp = document.getElementById(`f-${field}-${idx}`);
  if (inp) inp.value = val;
  saveData();
  refreshCardBadges(idx);
  if (field === "sets") rebuildPills(idx);
  updateStats();
}

function refreshCardBadges(idx) {
  const card = document.getElementById(`card-${idx}`);
  if (!card) return;
  const ex = state.exercises[idx];
  const rb = card.querySelector(".badge-reps");
  const wb = card.querySelector(".badge-weight");
  if (rb) rb.textContent = `${ex.sets}×${ex.reps}`;
  if (wb) wb.textContent = ex.weight > 0 ? `${ex.weight} kg` : "—";
}

function rebuildPills(idx) {
  const card = document.getElementById(`card-${idx}`);
  if (!card) return;
  const ex = state.exercises[idx];
  const row = card.querySelector(".ex-sets-row");
  const done = state.doneSets[ex.id] || [];
  let html = "";
  for (let s = 0; s < ex.sets; s++) {
    html += `<div class="set-pill ${done[s] ? "done" : ""}" onclick="toggleSet(${idx},${s})">
      <span class="set-num">S${s+1}</span>
      <span class="set-check">${done[s] ? "✓" : "○"}</span>
    </div>`;
  }
  row.innerHTML = html;
}

// ── DELETE ──
function deleteExercise(idx) {
  if (!confirm(`"${state.exercises[idx].name}" löschen?`)) return;
  const ex = state.exercises[idx];
  delete state.doneSets[ex.id];
  state.exercises.splice(idx, 1);
  if (openCard === idx) openCard = null;
  else if (openCard > idx) openCard--;
  saveData();
  buildAll();
}

// ── STATS & SUMMARY ──
function updateStats() {
  const exs = state.exercises;
  let totalSets = 0, doneSetsCount = 0;
  let totalVol = 0, totalVolDone = 0;
  let totalReps = 0;
  let totalWeightAllSets = 0; // sum of weight * sets for every exercise
  let weightCount = 0, weightSum = 0;

  exs.forEach(ex => {
    totalSets += ex.sets;
    totalReps += ex.sets * ex.reps;
    const d = state.doneSets[ex.id] || [];
    const dc = d.filter(Boolean).length;
    doneSetsCount += dc;

    if (ex.weight > 0) {
      totalWeightAllSets += ex.weight * ex.sets;
      totalVol += ex.sets * ex.reps * ex.weight;
      totalVolDone += dc * ex.reps * ex.weight;
      weightSum += ex.weight;
      weightCount++;
    }
  });

  const pct = totalSets > 0 ? Math.round((doneSetsCount / totalSets) * 100) : 0;

  // Top stats bar
  document.getElementById("statSets").textContent = `${doneSetsCount}/${totalSets}`;
  document.getElementById("statExCount").textContent = exs.length;
  document.getElementById("statKg").textContent = weightCount > 0 ? `${(weightSum/weightCount).toFixed(0)}` : "—";
  document.getElementById("statVol").textContent = totalVolDone > 0 ? totalVolDone.toLocaleString("de") : "—";

  // Summary card
  document.getElementById("sumTotalWeight").innerHTML = totalWeightAllSets > 0
    ? `${totalWeightAllSets.toLocaleString("de")}<span>kg</span>` : `—<span>kg</span>`;
  document.getElementById("sumVolDone").innerHTML = totalVolDone > 0
    ? `${totalVolDone.toLocaleString("de")}<span>kg</span>` : `—<span>kg</span>`;
  document.getElementById("sumSetsTotal").innerHTML = `${totalSets}<span>Sätze</span>`;
  document.getElementById("sumRepsTotal").innerHTML = `${totalReps.toLocaleString("de")}<span>Wdh.</span>`;
  document.getElementById("sumProgress").textContent = `${pct}%`;
}

// ── ADD EXERCISE ──
document.getElementById("addExBtn").onclick = () => {
  document.getElementById("newExName").value = "";
  document.getElementById("newExSets").value = 3;
  document.getElementById("newExReps").value = 12;
  document.getElementById("newExWeight").value = 20;
  document.getElementById("addModal").classList.add("show");
  setTimeout(() => document.getElementById("newExName").focus(), 300);
};

document.getElementById("cancelAddEx").onclick = () => {
  document.getElementById("addModal").classList.remove("show");
};

document.getElementById("confirmAddEx").onclick = () => {
  const name = document.getElementById("newExName").value.trim();
  if (!name) { document.getElementById("newExName").focus(); return; }
  const sets   = Math.max(1, parseInt(document.getElementById("newExSets").value) || 3);
  const reps   = Math.max(1, parseInt(document.getElementById("newExReps").value) || 12);
  const weight = Math.max(0, parseFloat(document.getElementById("newExWeight").value) || 0);

  state.exercises.push({ id: nextId++, name, sets, reps, weight, notes: "" });
  saveData();
  buildAll();
  document.getElementById("addModal").classList.remove("show");
  // Scroll to bottom
  setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" }), 100);
};

function modalStep(id, delta) {
  const inp = document.getElementById(id);
  let val = parseFloat(inp.value) + delta;
  if (id === "newExSets") val = Math.max(1, Math.min(10, Math.round(val)));
  else if (id === "newExReps") val = Math.max(1, Math.min(100, Math.round(val)));
  else val = Math.max(0, Math.round(val * 10) / 10);
  inp.value = val;
}

// ── RESET ──
document.getElementById("resetBtn").onclick = () => {
  if (confirm("Alle Sätze zurücksetzen?")) {
    state.doneSets = {};
    saveData();
    buildAll();
  }
};

// ── TIMER ──
let timerInterval = null, timerRemaining = 90, timerTotal = 90, timerRunning = false;

document.getElementById("timerBtn").onclick = () =>
  document.getElementById("timerOverlay").classList.add("show");
document.getElementById("closeTimer").onclick = () =>
  document.getElementById("timerOverlay").classList.remove("show");

function setTimer(secs, btn) {
  document.querySelectorAll(".preset-btn").forEach(b => b.classList.remove("sel"));
  if (btn) btn.classList.add("sel");
  timerTotal = secs; timerRemaining = secs;
  if (timerRunning) { clearInterval(timerInterval); timerRunning = false; document.getElementById("startTimer").textContent = "▶"; }
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const m = String(Math.floor(timerRemaining / 60)).padStart(2, "0");
  const s = String(timerRemaining % 60).padStart(2, "0");
  document.getElementById("timerDisplay").textContent = `${m}:${s}`;
  document.getElementById("timerDisplay").style.color = timerRemaining <= 10 ? "#ff4d6d" : "var(--accent)";
}

document.getElementById("startTimer").onclick = () => {
  if (timerRunning) {
    clearInterval(timerInterval); timerRunning = false;
    document.getElementById("startTimer").textContent = "▶";
  } else {
    if (timerRemaining <= 0) timerRemaining = timerTotal;
    timerRunning = true;
    document.getElementById("startTimer").textContent = "⏸";
    timerInterval = setInterval(() => {
      timerRemaining--;
      updateTimerDisplay();
      if (timerRemaining <= 0) {
        clearInterval(timerInterval); timerRunning = false;
        document.getElementById("startTimer").textContent = "▶";
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        document.getElementById("timerDisplay").textContent = "FERTIG!";
      }
    }, 1000);
  }
};

document.getElementById("resetTimerBtn").onclick = () => {
  clearInterval(timerInterval); timerRunning = false; timerRemaining = timerTotal;
  document.getElementById("startTimer").textContent = "▶";
  updateTimerDisplay();
};

// Close modals on backdrop tap
document.getElementById("timerOverlay").addEventListener("click", e => {
  if (e.target === document.getElementById("timerOverlay"))
    document.getElementById("timerOverlay").classList.remove("show");
});
document.getElementById("addModal").addEventListener("click", e => {
  if (e.target === document.getElementById("addModal"))
    document.getElementById("addModal").classList.remove("show");
});

// ── INIT ──
updateTimerDisplay();
buildAll();
</script>
</body>
</html>
